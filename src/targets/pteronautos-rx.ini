# ------------------------- PTERONAUTOS RX TARGET -----------------
# PteronautOS -- Ornithopter Flight Firmware (forked from ExpressLRS)
# Specialized firmware for servo-driven ornithopters.
#
# Uses #ifndef ORNITHOPTER_MODE guards throughout rx_main.cpp to
# exclude serial protocols, analog/battery, baro, VTX, thermal.
# Core radio link, PWM output, LED, button, WiFi config: all kept.
#
# Extends ESP8285 RX (2.4GHz SX1280) -- the standard ELRS PWM receiver hardware.

[env_common_pteronautos_rx]
extends = env_common_8285rx, radio_SX128X
build_flags =
    ${env_common_8285rx.build_flags}
    ${common_env_data.build_flags_rx}
    ${radio_SX128X.build_flags}
    -D ORNITHOPTER_MODE=1
    -D PTERONAUTOS=1
    -include target/Unified_ESP_RX.h
    -Ilib/Ornithopter
build_src_filter =
    ${env_common_esp82xx.build_src_filter}
    -<tx_*.cpp> -<tx-*/>

[env:PteronautOS_ESP8285_2400_RX]
extends = env_common_pteronautos_rx
